<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Advertiser — Maknarona by Adsy</title>
  <link rel="icon" type="image/png" href="../assets/logo-maknarona.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6fb; min-height: 100vh; }

    header {
      background: #fff; padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .logo { display: flex; align-items: center; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .user-name { font-size: 14px; color: #374151; font-weight: 500; }
    .new-order-btn {
      padding: 8px 16px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 7px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .new-order-btn:hover { background: #4338ca; }
    .logout-btn {
      font-size: 13px; color: #6b7280;
      background: none; border: none; cursor: pointer;
    }
    .logout-btn:hover { color: #dc2626; }

    .container { max-width: 760px; margin: 32px auto; padding: 0 20px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: #fff; border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-card .val { font-size: 26px; font-weight: 700; color: #1e1e2e; }
    .stat-card .lbl { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .stat-card.waiting .val { color: #d97706; }
    .stat-card.assigned .val { color: #2563eb; }
    .stat-card.progress .val { color: #7c3aed; }
    .stat-card.done .val { color: #16a34a; }

    .filter-row {
      display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 14px; border-radius: 99px;
      font-size: 13px; font-weight: 500;
      border: 1.5px solid #e5e7eb;
      background: #fff; color: #6b7280;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active {
      background: #4f46e5; color: #fff; border-color: #4f46e5;
    }

    .orders-list { display: flex; flex-direction: column; gap: 12px; }
    .order-card {
      background: #fff; border-radius: 12px;
      padding: 20px 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .order-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }
    .order-brand { font-size: 16px; font-weight: 600; color: #1e1e2e; }
    .order-date { font-size: 12px; color: #9ca3af; margin-top: 2px; }

    .badge {
      font-size: 11px; font-weight: 600; padding: 4px 12px;
      border-radius: 99px; text-transform: uppercase; white-space: nowrap;
    }
    .badge.waiting { background: #fef9c3; color: #854d0e; }
    .badge.assigned { background: #dbeafe; color: #1d4ed8; }
    .badge.in_progress { background: #ede9fe; color: #5b21b6; }
    .badge.done { background: #dcfce7; color: #15803d; }
    .badge.revision { background: #fff7ed; color: #c2410c; }

    .order-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px; }
    .meta-item { font-size: 13px; color: #6b7280; }
    .meta-item span { color: #374151; font-weight: 500; }

    .progress-bar-wrap { margin-top: 14px; }
    .progress-steps {
      display: flex; align-items: center; gap: 0;
      position: relative;
    }
    .step {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; position: relative; z-index: 1;
    }
    .step-dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: #e5e7eb; border: 2px solid #e5e7eb;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #9ca3af;
      transition: all 0.3s;
    }
    .step-dot.done-dot { background: #4f46e5; border-color: #4f46e5; color: #fff; }
    .step-dot.current-dot { background: #fff; border-color: #4f46e5; color: #4f46e5; font-weight: 700; }
    .step-label { font-size: 11px; color: #9ca3af; margin-top: 5px; text-align: center; }
    .step-label.active-label { color: #4f46e5; font-weight: 600; }
    .step-line {
      flex: 1; height: 2px; background: #e5e7eb;
      margin: 0 -2px; margin-bottom: 18px; z-index: 0;
      transition: background 0.3s;
    }
    .step-line.filled { background: #4f46e5; }

    .creator-box {
      margin-top: 12px; padding: 12px 14px;
      background: #f0fdf4; border-radius: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .creator-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #4f46e5; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
    }
    .creator-box .creator-name { font-size: 13px; font-weight: 600; color: #15803d; }
    .creator-box .creator-lbl { font-size: 12px; color: #6b7280; }

    .queue-box {
      margin-top: 12px; padding: 10px 14px;
      background: #fefce8; border-radius: 8px;
      font-size: 13px; color: #854d0e;
    }

    .empty-msg { text-align: center; color: #9ca3af; font-size: 14px; padding: 48px 0; }
    .loading { text-align: center; color: #6b7280; padding: 32px; }

    .revision-note-box {
      margin-top: 10px; padding: 10px 14px;
      background: #fff7ed; border-radius: 8px;
      border-left: 3px solid #f97316;
    }
    .revision-note-box .rev-label { font-size: 11px; font-weight: 700; color: #c2410c; margin-bottom: 3px; }
    .revision-note-box .rev-text { font-size: 13px; color: #9a3412; line-height: 1.5; }

    .revision-btn {
      margin-top: 10px; width: 100%; padding: 9px;
      background: #fff7ed; color: #c2410c;
      border: 1.5px solid #fed7aa; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .revision-btn:hover { background: #f97316; color: #fff; border-color: #f97316; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff; border-radius: 20px;
      padding: 28px; width: 100%; max-width: 440px; margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-box h3 { font-size: 17px; font-weight: 700; color: #1e1e2e; margin-bottom: 6px; }
    .modal-box p { font-size: 13px; color: #9ca3af; margin-bottom: 16px; }
    .modal-box textarea {
      width: 100%; height: 100px; padding: 12px;
      border: none; border-radius: 10px;
      background: #f5f4fb; font-size: 13px;
      resize: none; outline: none; margin-bottom: 14px;
      font-family: inherit;
    }
    .modal-box textarea:focus { box-shadow: 0 0 0 2px #fed7aa; background: #fff7ed; }
    .modal-actions { display: flex; gap: 8px; }
    .modal-actions button {
      flex: 1; padding: 12px; border-radius: 10px;
      font-size: 14px; font-weight: 600; border: none; cursor: pointer;
    }
    .btn-cancel { background: #f5f4fb; color: #6b7280; }
    .btn-submit { background: #f97316; color: #fff; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 480px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo" style="display:flex;align-items:center;gap:10px;">
      <img src="../assets/logo-maknarona.png" alt="Maknarona by Adsy" style="height:36px;width:auto;">
      <div>
        <div style="font-size:15px;font-weight:800;color:#4f46e5;line-height:1;">Maknarona</div>
        <div style="font-size:10px;font-weight:500;color:#9ca3af;line-height:1.4;">by Adsy</div>
      </div>
    </div>
    <div class="header-right">
      <span class="user-name" id="userName">—</span>
      <a href="../request.html" class="new-order-btn">+ Request Baru</a>
      <button class="logout-btn" onclick="doLogout()">Keluar</button>
    </div>
  </header>

  <!-- Revision Modal -->
  <div class="modal-overlay" id="revisionModal">
    <div class="modal-box">
      <h3>Minta Revisi</h3>
      <p>Jelaskan apa yang perlu diperbaiki oleh creator.</p>
      <textarea id="revisionNoteInput" placeholder="Contoh: Tolong ubah warna background menjadi putih..."></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeRevisionModal()">Batal</button>
        <button class="btn-submit" id="submitRevisionBtn" onclick="submitRevision()">Kirim Revisi</button>
      </div>
    </div>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card waiting">
        <div class="val" id="countWaiting">—</div>
        <div class="lbl">Menunggu</div>
      </div>
      <div class="stat-card assigned">
        <div class="val" id="countAssigned">—</div>
        <div class="lbl">Ditugaskan</div>
      </div>
      <div class="stat-card progress">
        <div class="val" id="countProgress">—</div>
        <div class="lbl">Dikerjakan</div>
      </div>
      <div class="stat-card done">
        <div class="val" id="countDone">—</div>
        <div class="lbl">Selesai</div>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterOrders('all', this)">Semua</button>
      <button class="filter-btn" onclick="filterOrders('waiting', this)">Menunggu</button>
      <button class="filter-btn" onclick="filterOrders('assigned', this)">Ditugaskan</button>
      <button class="filter-btn" onclick="filterOrders('in_progress', this)">Dikerjakan</button>
      <button class="filter-btn" onclick="filterOrders('revision', this)">Revisi</button>
      <button class="filter-btn" onclick="filterOrders('done', this)">Selesai</button>
    </div>

    <!-- Orders -->
    <div class="orders-list" id="ordersList">
      <p class="loading">Memuat order...</p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://woqznjubhmjraqapgyat.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvcXpuanViaG1qcmFxYXBneWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzUxNTgsImV4cCI6MjA5MjUxMTE1OH0.xBHG0aeKLutXyqTjlhpGVIYy7-wuI-ztI9e73wmRL04';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allOrders = [];
    let currentFilter = 'all';
    let activeRevisionOrderId = null;
    let activeRevisionData = null;
    const ordersMap = {};

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const meta = session.user.user_metadata;
      const displayName = meta?.team ? `${meta.name} · ${meta.team}` : (meta?.name || session.user.email);
      document.getElementById('userName').textContent = displayName;

      await loadOrders(session.user.id);

      supabase.channel('adv-orders')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'orders',
          filter: `advertiser_id=eq.${session.user.id}` }, () => loadOrders(session.user.id))
        .subscribe();
    }

    async function loadOrders(userId) {
      const { data, error } = await supabase
        .from('orders')
        .select('*, creators(name, wa_number)')
        .eq('advertiser_id', userId)
        .order('created_at', { ascending: false });

      if (error || !data) {
        document.getElementById('ordersList').innerHTML = '<p class="empty-msg">Gagal memuat order.</p>';
        return;
      }

      allOrders = data;
      data.forEach(o => ordersMap[o.id] = o);
      updateStats(data);
      const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
      renderOrders(filtered);
    }

    function updateStats(data) {
      document.getElementById('countWaiting').textContent = data.filter(o => o.status === 'waiting').length;
      document.getElementById('countAssigned').textContent = data.filter(o => o.status === 'assigned').length;
      document.getElementById('countProgress').textContent = data.filter(o => ['in_progress','revision'].includes(o.status)).length;
      document.getElementById('countDone').textContent = data.filter(o => o.status === 'done').length;
    }

    function renderOrders(data) {
      const list = document.getElementById('ordersList');
      if (!data || data.length === 0) {
        list.innerHTML = '<p class="empty-msg">Belum ada order' + (currentFilter !== 'all' ? ' dengan status ini' : '') + '.</p>';
        return;
      }

      const statusLabel = { waiting: 'Menunggu', assigned: 'Ditugaskan', in_progress: 'Dikerjakan', revision: 'Revisi', done: 'Selesai' };
      const stepOrder = ['waiting', 'assigned', 'in_progress', 'done'];
      const stepNames = ['Request', 'Ditugaskan', 'Dikerjakan', 'Selesai'];

      list.innerHTML = data.map(order => {
        // revision dianggap step in_progress di progress bar
        const statusForStep = order.status === 'revision' ? 'in_progress' : order.status;
        const currentStep = stepOrder.indexOf(statusForStep);

        const progressHTML = `
          <div class="progress-bar-wrap">
            <div class="progress-steps">
              ${stepNames.map((name, i) => `
                ${i > 0 ? `<div class="step-line ${i <= currentStep ? 'filled' : ''}"></div>` : ''}
                <div class="step">
                  <div class="step-dot ${i < currentStep ? 'done-dot' : i === currentStep ? 'current-dot' : ''}">
                    ${i < currentStep ? '✓' : i + 1}
                  </div>
                  <span class="step-label ${i === currentStep ? 'active-label' : ''}">${name}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        const creatorHTML = order.creators ? `
          <div class="creator-box">
            <div class="creator-avatar">${order.creators.name.charAt(0).toUpperCase()}</div>
            <div>
              <div class="creator-name">${order.creators.name}</div>
              <div class="creator-lbl">Content Creator</div>
            </div>
          </div>
        ` : order.status === 'waiting' ? `
          <div class="queue-box">Sedang mencari creator yang tersedia untuk ordermu...</div>
        ` : '';

        const revisionNoteHTML = order.status === 'revision' && order.revision_note ? `
          <div class="revision-note-box">
            <div class="rev-label">CATATAN REVISI${order.revision_count > 1 ? ` #${order.revision_count}` : ''}</div>
            <div class="rev-text">${order.revision_note}</div>
          </div>
        ` : '';

        const driveHTML = order.drive_link ? `
          <div style="margin-top:12px;padding:12px 14px;background:#f0fdf4;border-radius:10px;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:13px;color:#166534;font-weight:500;">
              Hasil konten${order.revision_count > 0 ? ` (Revisi ke-${order.revision_count})` : ''} sudah dikirim
            </span>
            <a href="${order.drive_link}" target="_blank" style="font-size:13px;font-weight:700;color:#16a34a;text-decoration:none;background:#dcfce7;padding:6px 14px;border-radius:8px;">Lihat di Drive</a>
          </div>
        ` : '';

        const revisionBtnHTML = order.status === 'done' && order.drive_link ? `
          <button class="revision-btn" onclick="openRevisionModal('${order.id}')">
            Minta Revisi
          </button>
        ` : '';

        return `
          <div class="order-card">
            <div class="order-top">
              <div>
                <div class="order-brand">${order.brand}</div>
                <div class="order-date">${new Date(order.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
              </div>
              <span class="badge ${order.status}">${statusLabel[order.status]}</span>
            </div>
            <div class="order-meta">
              <div class="meta-item">Jenis: <span>${order.content_type}</span></div>
              ${order.platform ? `<div class="meta-item">Platform: <span>${order.platform}</span></div>` : ''}
              ${order.deadline ? `<div class="meta-item">Deadline: <span>${order.deadline}</span></div>` : ''}
              ${order.revision_count > 0 ? `<div class="meta-item">Revisi: <span>${order.revision_count}x</span></div>` : ''}
            </div>
            ${progressHTML}
            ${creatorHTML}
            ${revisionNoteHTML}
            ${driveHTML}
            ${revisionBtnHTML}
          </div>
        `;
      }).join('');
    }

    window.openRevisionModal = function(orderId) {
      const order = ordersMap[orderId];
      if (!order) return;
      activeRevisionOrderId = orderId;
      activeRevisionData = {
        creatorWa: order.creators?.wa_number || '',
        creatorName: order.creators?.name || '',
        brand: order.brand,
        contentType: order.content_type,
        revCount: order.revision_count || 0,
      };
      document.getElementById('revisionNoteInput').value = '';
      document.getElementById('revisionModal').classList.add('show');
    };

    window.closeRevisionModal = function() {
      document.getElementById('revisionModal').classList.remove('show');
    };

    window.submitRevision = async function() {
      const note = document.getElementById('revisionNoteInput').value.trim();
      const btn = document.getElementById('submitRevisionBtn');
      if (!note) { alert('Isi dulu catatan revisinya.'); return; }

      btn.disabled = true; btn.textContent = 'Mengirim...';

      const newRevCount = (activeRevisionData.revCount || 0) + 1;
      const { error } = await supabase.from('orders').update({
        status: 'revision',
        revision_note: note,
        revision_count: newRevCount,
        drive_link: null,
      }).eq('id', activeRevisionOrderId);

      if (error) { alert('Gagal: ' + error.message); btn.disabled = false; btn.textContent = 'Kirim Revisi'; return; }

      // Kirim notif WA ke creator
      if (activeRevisionData.creatorWa) {
        fetch('/api/send-wa', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: activeRevisionData.creatorWa, type: 'revision_request', data: {
            creator_name: activeRevisionData.creatorName,
            brand: activeRevisionData.brand,
            content_type: activeRevisionData.contentType,
            advertiser_name: document.getElementById('userName').textContent,
            revision_note: note,
            revision_count: newRevCount,
          }})
        }).catch(() => {});
      }

      btn.disabled = false; btn.textContent = 'Kirim Revisi';
      closeRevisionModal();
    };

    window.filterOrders = function (status, btn) {
      currentFilter = status;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
      renderOrders(filtered);
    };

    window.doLogout = async function () {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    };

    init();
  </script>
</body>
</html>
