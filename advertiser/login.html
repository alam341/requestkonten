<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Advertiser — Adsy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff; border-radius: 16px;
      padding: 40px; width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 22px; font-weight: 700; color: #4f46e5; margin-bottom: 24px; }
    .tabs {
      display: flex; gap: 0;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      overflow: hidden; margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 10px;
      text-align: center; font-size: 14px; font-weight: 500;
      cursor: pointer; background: #fff; color: #6b7280;
      border: none; transition: all 0.2s;
    }
    .tab.active { background: #4f46e5; color: #fff; }
    h2 { font-size: 18px; font-weight: 600; color: #1e1e2e; margin-bottom: 4px; }
    p.sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 14px; color: #1e1e2e;
      background: #fafafa; outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #4f46e5; background: #fff; }
    .btn {
      width: 100%; padding: 12px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .error-msg { display: none; color: #dc2626; font-size: 13px; margin-top: 10px; text-align: center; }
    .success-msg { display: none; color: #16a34a; font-size: 13px; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Adsy</div>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Masuk</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- Login -->
    <div id="loginSection">
      <h2>Selamat datang</h2>
      <p class="sub">Masuk untuk kelola dan pantau semua ordermu.</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="email@kamu.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Masuk</button>
      <p class="error-msg" id="loginError"></p>
    </div>

    <!-- Register -->
    <div id="registerSection" style="display:none">
      <h2>Buat akun</h2>
      <p class="sub">Daftar untuk mulai request content creator.</p>
      <div class="field">
        <label>Nama</label>
        <input type="text" id="regName" placeholder="Nama kamu" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="email@kamu.com" />
      </div>
      <div class="field">
        <label>No. WhatsApp</label>
        <input type="tel" id="regWa" placeholder="08xxxxxxxxxx" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 8 karakter" />
      </div>
      <button class="btn" id="registerBtn" onclick="doRegister()">Daftar</button>
      <p class="error-msg" id="registerError"></p>
      <p class="success-msg" id="registerSuccess"></p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'GANTI_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'GANTI_SUPABASE_ANON_KEY';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    supabase.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'dashboard.html';
    });

    window.switchTab = function (tab) {
      document.getElementById('loginSection').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerSection').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tabLogin').className = 'tab' + (tab === 'login' ? ' active' : '');
      document.getElementById('tabRegister').className = 'tab' + (tab === 'register' ? ' active' : '');
    };

    window.doLogin = async function () {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');

      btn.disabled = true; btn.textContent = 'Masuk...';
      err.style.display = 'none';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        err.textContent = 'Email atau password salah.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Masuk';
      } else {
        window.location.href = 'dashboard.html';
      }
    };

    window.doRegister = async function () {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const wa = document.getElementById('regWa').value.trim();
      const password = document.getElementById('regPassword').value;
      const btn = document.getElementById('registerBtn');
      const err = document.getElementById('registerError');
      const suc = document.getElementById('registerSuccess');

      if (!name || !email || !wa || !password) {
        err.textContent = 'Semua field wajib diisi.';
        err.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = 'Mendaftar...';
      err.style.display = 'none'; suc.style.display = 'none';

      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { name, wa_number: wa } }
      });

      btn.disabled = false; btn.textContent = 'Daftar';

      if (error) {
        err.textContent = error.message || 'Gagal mendaftar.';
        err.style.display = 'block';
      } else {
        suc.textContent = 'Akun berhasil dibuat! Cek email untuk verifikasi, lalu masuk.';
        suc.style.display = 'block';
      }
    };

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const isLogin = document.getElementById('loginSection').style.display !== 'none';
        isLogin ? window.doLogin() : window.doRegister();
      }
    });
  </script>
</body>
</html>
