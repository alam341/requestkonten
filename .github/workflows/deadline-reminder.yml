name: Deadline Reminder                                                       
                                                                                
  on:                                                                         
    schedule:                                                                 
      - cron: '0 2 * * *'
    workflow_dispatch:

  jobs:
    send-reminder:
      runs-on: ubuntu-latest
      steps:                                                                    
        - name: Kirim WA Reminder Deadline
          run: |                                                                
            curl -X GET https://requestkonten.vercel.app/api/cron-deadline \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \         
              -f \                                                              
              --silent \
              --show-error
