<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cek Status Order — Maknarona by Adsy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { margin-bottom: 12px; }
    h1 { font-size: 20px; font-weight: 600; color: #1e1e2e; margin-bottom: 4px; }
    p.sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 14px; color: #1e1e2e;
      background: #fafafa; outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #4f46e5; background: #fff; }
    .btn {
      width: 100%; padding: 12px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .back-link {
      text-align: center; margin-top: 16px;
      font-size: 13px; color: #6b7280;
    }
    .back-link a { color: #4f46e5; text-decoration: none; font-weight: 500; }
    .results { margin-top: 28px; }
    .order-card {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 14px;
    }
    .order-card .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .order-card .brand { font-weight: 600; font-size: 15px; color: #1e1e2e; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 4px 10px;
      border-radius: 99px; text-transform: uppercase;
    }
    .badge.waiting { background: #fef9c3; color: #854d0e; }
    .badge.assigned { background: #dbeafe; color: #1d4ed8; }
    .badge.in_progress { background: #e0e7ff; color: #4338ca; }
    .badge.done { background: #dcfce7; color: #15803d; }
    .order-detail { font-size: 13px; color: #6b7280; margin-top: 4px; }
    .order-detail span { color: #374151; font-weight: 500; }
    .creator-info {
      margin-top: 12px;
      padding: 10px 14px;
      background: #f0fdf4;
      border-radius: 8px;
      font-size: 13px;
      color: #166534;
    }
    .creator-info strong { color: #15803d; }
    .empty-msg { text-align: center; color: #9ca3af; font-size: 14px; margin-top: 24px; }
    .error-msg { display: none; color: #dc2626; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" style="display:flex;align-items:center;gap:12px;">
      <img src="assets/logo-maknarona.png" alt="Maknarona by Adsy" style="height:52px;width:auto;">
      <div>
        <div style="font-size:18px;font-weight:800;color:#4f46e5;line-height:1;">Maknarona</div>
        <div style="font-size:11px;font-weight:500;color:#9ca3af;line-height:1.4;">by Adsy</div>
      </div>
    </div>
    <h1>Cek Status Order</h1>
    <p class="sub">Masukkan nomor WhatsApp yang kamu gunakan saat request.</p>

    <div class="field">
      <label>No. WhatsApp</label>
      <input type="tel" id="wa_input" placeholder="08xxxxxxxxxx" />
    </div>
    <button class="btn" id="checkBtn" onclick="checkOrders()">Cek Sekarang</button>
    <p class="error-msg" id="errorMsg"></p>

    <div class="results" id="results"></div>

    <p class="back-link" style="margin-top:24px;">
      <a href="index.html">← Buat request baru</a>
    </p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://woqznjubhmjraqapgyat.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvcXpuanViaG1qcmFxYXBneWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzUxNTgsImV4cCI6MjA5MjUxMTE1OH0.xBHG0aeKLutXyqTjlhpGVIYy7-wuI-ztI9e73wmRL04';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.checkOrders = async function () {
      const wa = document.getElementById('wa_input').value.trim();
      const btn = document.getElementById('checkBtn');
      const errorMsg = document.getElementById('errorMsg');
      const results = document.getElementById('results');

      if (!wa) {
        errorMsg.textContent = 'Masukkan nomor WhatsApp dulu.';
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Mencari...';
      results.innerHTML = '';

      const { data, error } = await supabase
        .from('orders')
        .select('*, creators(name, wa_number)')
        .eq('wa_number', wa)
        .order('created_at', { ascending: false });

      btn.disabled = false;
      btn.textContent = 'Cek Sekarang';

      if (error) {
        errorMsg.textContent = 'Gagal mengambil data. Coba lagi.';
        errorMsg.style.display = 'block';
        return;
      }

      if (!data || data.length === 0) {
        results.innerHTML = '<p class="empty-msg">Tidak ada order ditemukan untuk nomor ini.</p>';
        return;
      }

      const statusLabel = { waiting: 'Menunggu', assigned: 'Ditugaskan', in_progress: 'Dikerjakan', done: 'Selesai' };

      results.innerHTML = data.map(order => `
        <div class="order-card">
          <div class="header">
            <span class="brand">${order.brand}</span>
            <span class="badge ${order.status}">${statusLabel[order.status] || order.status}</span>
          </div>
          <div class="order-detail">Jenis: <span>${order.content_type}</span></div>
          ${order.platform ? `<div class="order-detail">Platform: <span>${order.platform}</span></div>` : ''}
          ${order.deadline ? `<div class="order-detail">Deadline: <span>${order.deadline}</span></div>` : ''}
          <div class="order-detail">Tanggal Request: <span>${new Date(order.created_at).toLocaleDateString('id-ID')}</span></div>
          ${order.creators ? `
            <div class="creator-info">
              Creator: <strong>${order.creators.name}</strong>
            </div>
          ` : ''}
        </div>
      `).join('');
    };

    // auto-check if WA in URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('wa')) {
      document.getElementById('wa_input').value = params.get('wa');
      window.checkOrders();
    }
  </script>
</body>
</html>
